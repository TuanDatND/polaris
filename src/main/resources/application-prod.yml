spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.cloud.polaris: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: OFF
    org.springframework.security: WARN

polaris:
  task:
    poll-interval: 2s
    worker-concurrency: 4
    recovery-timeout: 5m
    recovery-interval: 30s
    recovery-batch-size: 100