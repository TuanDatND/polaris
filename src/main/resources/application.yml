spring:
  application:
    name: polaris

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  threads:
    virtual:
      enabled: true

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        jdbc:
          time_zone: ${APP_TIME_ZONE:UTC}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true


server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

jwt:
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

app:
  cors:
    allowed-origins:
      - ${APP_CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
      - ${APP_CORS_ALLOWED_ORIGIN_2:http://localhost:5173}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-Requested-With
      - X-Idempotency-Key
      - X-Tenant-Id
    exposed-headers:
      - Authorization
    allow-credentials: false
    max-age: 3600
